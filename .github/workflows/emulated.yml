name: emulated
on:
  - push
  - pull_request
  - merge_group
  - workflow_dispatch

defaults:
  run:
    shell: bash

jobs:
  # Emulation is incredibly slow and memory demanding. It seems that any
  # executable with GHC RTS takes at least 7-8 Gb of RAM, so we can run
  # `cabal` or `ghc` on their own, but cannot run them both at the same time,
  # striking out `cabal test`. Instead we rely on system packages and invoke
  # `ghc --make` manually, and even so `ghc -O` is prohibitively expensive.
  emulated:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch: ['s390x', 'ppc64le', 'riscv64', 'armv7', 'aarch64']
    steps:
    - uses: actions/checkout@v7
    - uses: uraimo/run-on-arch-action@v3
      timeout-minutes: 60
      with:
        arch: ${{ matrix.arch }}
        distro: ubuntu_rolling
        githubToken: ${{ github.token }}
        install: |
          apt-get update -y
          apt-get install -y autoconf build-essential curl ghc libghc-tasty-quickcheck-dev libghc-file-embed-dev libghc-temporary-dev libghc-file-io-dev libghc-directory-ospath-streaming-dev
        run: |
          ghc --version
          ghc --make -fPIC -fno-safe-haskell -itest -o Main test/Properties.hs +RTS -s
          ./Main +RTS -s
